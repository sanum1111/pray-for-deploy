<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Project Candle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #050509;
            --wax: #f5f1e6;
            --wick: #222;
            --flame-inner: #ffd27a;
            --flame-outer: #ff8b3d;
            --text: #f5f5f5;
            --muted: #888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            background: radial-gradient(circle at top, #151525 0, var(--bg) 55%);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
        }

        h1 {
            margin-bottom: 32px;
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            text-align: center;
            letter-spacing: 0.04em;
        }

        .subtitle {
            margin-top: 8px;
            font-size: 0.9rem;
            color: var(--muted);
            text-align: center;
        }

        .candle-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            user-select: none;
        }

        .candle {
            position: relative;
            width: 80px;
            height: 160px;
            background: linear-gradient(180deg, #fdfaf3 0%, var(--wax) 40%, #d7d0c0 100%);
            border-radius: 40px 40px 18px 18px;
            box-shadow:
                    0 0 0 1px rgba(255, 255, 255, 0.08),
                    0 18px 40px rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 26px;
        }

        .candle::after {
            /* melted wax edge */
            content: "";
            position: absolute;
            top: 22px;
            left: 10px;
            right: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at top, #fffdf7 0, #e8e1d2 55%, transparent 70%);
            opacity: 0.9;
        }

        .wick {
            position: relative;
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #000, #444);
            border-radius: 999px;
            z-index: 2;
        }

        .flame {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 42px;
            transform-origin: 50% 100%;
            opacity: 0;
            pointer-events: none;
        }

        .flame-core {
            position: absolute;
            inset: 0;
            border-radius: 50% 50% 50% 50%;
            transform: scaleY(1.2) rotate(12deg);
            background:
                    radial-gradient(circle at 30% 20%, #fff 0, var(--flame-inner) 40%, transparent 70%),
                    radial-gradient(circle at 70% 80%, var(--flame-outer) 0, transparent 70%);
            filter: blur(0.4px);
        }

        .flame-glow {
            position: absolute;
            inset: -40px -30px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 180, 80, 0.45) 0, transparent 65%);
            mix-blend-mode: screen;
            opacity: 0.9;
        }

        .candle-lit .flame {
            opacity: 1;
            animation: flame-flicker 1.4s infinite ease-in-out alternate;
        }

        .candle-lit .flame-core {
            animation: flame-shape 1.2s infinite ease-in-out alternate;
        }

        .candle-lit .flame-glow {
            animation: flame-glow 1.6s infinite ease-in-out alternate;
        }

        @keyframes flame-flicker {
            0% {
                transform: translateX(-50%) translateY(0) scale(1);
            }
            50% {
                transform: translateX(-52%) translateY(-2px) scale(1.05);
            }
            100% {
                transform: translateX(-48%) translateY(1px) scale(0.97);
            }
        }

        @keyframes flame-shape {
            0% {
                transform: scaleY(1.15) rotate(10deg);
            }
            50% {
                transform: scaleY(1.3) rotate(6deg);
            }
            100% {
                transform: scaleY(1.05) rotate(14deg);
            }
        }

        @keyframes flame-glow {
            0% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.6;
            }
        }

        .hint {
            margin-top: 4px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .head {

        }
    </style>
</head>
<body>
<div class="head">
    <h1 id="project-title">Unnamed project</h1>
    <p class="subtitle">Click the candle to light or extinguish it.</p>
</div>

<div class="candle-wrapper" id="candle-toggle">
    <div class="candle" id="candle">
        <div class="wick"></div>
        <div class="flame">
            <div class="flame-core"></div>
            <div class="flame-glow"></div>
        </div>
    </div>
    <div class="hint">
        Pray for deploy
    </div>
</div>

<script>
    // Read project name from ?project=... in location.search
    (function () {
        const params = new URLSearchParams(window.location.search);
        const rawName = params.get("project");
        const titleEl = document.getElementById("project-title");

        if (rawName && rawName.trim()) {
            // decode + basic sanitization
            const name = rawName.replace(/\+/g, " ").trim();
            titleEl.textContent = name + " deployment";
            document.title = name + " – Candle";
        }

        const candle = document.getElementById("candle");
        const wrapper = document.getElementById("candle-toggle");

        let isLit = false;

        function render() {
            if (isLit) {
                candle.classList.add("candle-lit");
            } else {
                candle.classList.remove("candle-lit");
            }
        }

        wrapper.addEventListener("click", () => {
            isLit = !isLit;
            render();
        });

        render();
    })();
</script>
</body>
</html>
